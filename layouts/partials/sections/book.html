<!-- SECTION 6: Read the Book -->
<section class="py-24 px-4 bg-[var(--color-bg)]" id="book">
  <div class="max-w-4xl mx-auto">
    <div class="rounded-3xl overflow-hidden relative" style="background: linear-gradient(135deg, #0e1f4d 0%, #1e4aaa 50%, #0e1f4d 100%);">

      <!-- Background pattern -->
      <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle, #c9940e 1.5px, transparent 1.5px); background-size: 24px 24px;"></div>

      <div class="relative flex flex-col md:flex-row items-center gap-8 md:gap-12 p-8 md:p-12 lg:p-16">

        <!-- Book image -->
        <div class="shrink-0" data-animate>
          {{ with .Site.Params }}
          <a href="{{ .bookUrl }}" target="_blank" rel="noopener" class="block">
            <div class="relative">
              <div class="absolute -inset-3 bg-gold-500/20 rounded-2xl blur-xl"></div>
              <img
                src="{{ .bookImg }}"
                alt="Towards Maharlika"
                class="relative w-40 md:w-48 rounded-xl shadow-2xl hover:scale-105 transition-transform duration-300"
                onerror="this.style.display='none'"
              >
            </div>
          </a>
          {{ end }}
        </div>

        <!-- Text content -->
        <div class="flex-1 text-center md:text-left" data-animate>
        
<span class="font-cinzel text-xs tracking-[0.3em] uppercase text-gold-400 border border-gold-500/30 px-4 py-2 rounded-full inline-block mb-6">
  ᜀᜃ᜔ᜎᜆ᜔
</span>

<h2 class="font-cinzel text-3xl md:text-4xl font-bold text-white mb-4">
  {{ i18n "book.title" | default "The Maharlika Book" }}
</h2>

<div class="gold-divider md:mx-0 mb-6"></div>

<p class="text-gold-100/80 text-lg leading-relaxed mb-8 font-crimson">
  {{ i18n "book.description" | default "Learn more about the Maharlika advocacy" | safeHTML }}
</p>

<a
  href="{{ i18n "book.url" | default "#" }}"
  target="_blank"
  rel="noopener"
  class="btn-gold inline-flex"
>
  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/></svg>
  {{ i18n "book.cta" | default "Get on Play Store" }}
</a>
        </div>

      </div>
    </div>
  </div>
</section>
