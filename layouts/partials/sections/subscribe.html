<!-- SECTION 7: Subscribe -->
<section class="py-24 px-4 bg-royal-900 dark:bg-royal-950" id="subscribe">
  <div class="max-w-2xl mx-auto text-center">

    <div class="mb-8" data-animate>
      <span class="font-cinzel text-xs tracking-[0.3em] uppercase text-gold-500 border border-gold-500/30 px-4 py-2 rounded-full inline-block mb-6">
        ᜐᜓᜋᜎᜒ
      </span>

      <h2 class="font-cinzel text-3xl md:text-4xl font-bold text-gold-300 mb-4">
        {{ i18n "subscribe.title" | default "Stay Informed" }}
      </h2>
      <div class="gold-divider"></div>
      <p class="text-gold-100/60 mt-4 text-lg font-crimson">
        {{ i18n "subscribe.subtitle" | default "Subscribe to receive updates on the Maharlikanism advocacy, new articles, and important developments." }}
      </p>
    </div>
 
 <!-- novalidate -->
    <form id="subscribe-form" class="subscribe-form mt-10" action="https://usebasin.com/f/fe409f5e1e78" method="POST">
      <input name="Maharlikanism Subscriber" type="hidden">
      <input
        type="email"
        name="email"
        class="subscribe-input"
        placeholder='{{ i18n "subscribe.placeholder" | default "Enter your email address" }}'
        required
        autocomplete="email"
      >
      <button type="submit" class="btn-gold whitespace-nowrap">
        {{ i18n "subscribe.button" | default "Subscribe" }}
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </form>
    <p id="subscribe-msg" class="mt-3 text-sm" aria-live="polite"></p>
    <!-- <p class="mt-4 text-xs text-gold-100/30">{{ i18n "subscribe.privacy" | default "No spam. Unsubscribe at any time." }}</p> -->

  </div>
</section>
