<!-- SECTION 8: Contact Form -->
<section class="py-24 px-4 bg-[var(--color-bg)]" id="contact">
  <div class="max-w-2xl mx-auto">

    <div class="text-center mb-12" data-animate>
      <span class="font-cinzel text-xs tracking-[0.3em] uppercase text-gold-500 border border-gold-500/30 px-4 py-2 rounded-full inline-block mb-6">
        Get in Touch
      </span>
      <h2 class="section-title">Contact Us</h2>
      <div class="gold-divider"></div>
      <p class="section-subtitle mt-0">
        Have questions or want to get involved? Reach out to us.
      </p>
    </div>

    <form id="contact-form" class="bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl p-8 shadow-lg space-y-5" novalidate>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-[var(--color-text)] mb-1.5">
            Name <span class="text-gold-500">*</span>
          </label>
          <input
            type="text"
            name="name"
            required
            class="w-full px-4 py-3 rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)] text-[var(--color-text)] placeholder-[var(--color-muted)] focus:outline-none focus:ring-2 focus:ring-royal-500 focus:border-transparent transition-all"
            placeholder="Your name"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-[var(--color-text)] mb-1.5">
            Email <span class="text-gold-500">*</span>
          </label>
          <input
            type="email"
            name="email"
            required
            class="w-full px-4 py-3 rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)] text-[var(--color-text)] placeholder-[var(--color-muted)] focus:outline-none focus:ring-2 focus:ring-royal-500 focus:border-transparent transition-all"
            placeholder="your@email.com"
            autocomplete="email"
          >
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-[var(--color-text)] mb-1.5">
          Subject
        </label>
        <input
          type="text"
          name="subject"
          class="w-full px-4 py-3 rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)] text-[var(--color-text)] placeholder-[var(--color-muted)] focus:outline-none focus:ring-2 focus:ring-royal-500 focus:border-transparent transition-all"
          placeholder="How can we help?"
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-[var(--color-text)] mb-1.5">
          Message <span class="text-gold-500">*</span>
        </label>
        <textarea
          name="message"
          rows="5"
          required
          class="w-full px-4 py-3 rounded-lg border border-[var(--color-border)] bg-[var(--color-bg)] text-[var(--color-text)] placeholder-[var(--color-muted)] focus:outline-none focus:ring-2 focus:ring-royal-500 focus:border-transparent transition-all resize-vertical"
          placeholder="Your message..."
        ></textarea>
      </div>

      <button type="submit" class="btn-gold w-full justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        Send Message
      </button>

      <p id="contact-msg" class="text-sm text-center" aria-live="polite"></p>

    </form>

  </div>
</section>
