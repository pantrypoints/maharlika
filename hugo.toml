baseURL = "https://maharlika.superphysics.org/"
languageCode = "en-us"
title = "Maharlikanism"
enableRobotsTXT = true
enableGitInfo = false
summaryLength = 30

[build]
  buildDrafts = false
  buildFuture = false
  buildExpired = false
  writeStats = true

[markup]
  [markup.highlight]
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page = ["HTML"]


[params]
  description = "An advocacy to change the name, culture, and socio-economics of The Philippines into Maharlika"
  author = "Maharlikanism"
  image = "/lapu.jpg"
  music = "/music.mp3"
  googleAnalytics = "G-0NM7Z55HJR"
  googleAdsense = "ca-pub-2557957536703477"
  tawkTo = "6306798e37898912e964f594/default"
  bookImg = "/books/towards.jpg"
  bookUrl = "https://play.google.com/store/books/details?id=T-H4DwAAQBAJ&pli=1"
  defaultContentLanguage = "en"
  defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    weight = 1
    [languages.en.params]
      video = "https://www.youtube.com/embed/DUQVO9ZCCg8?si=MgCvQ5Vymqi8g7E2"
      langFlag = "🇺🇸"
      h1 = "ᜋᜑᜇ᜔ᜎᜒᜃ"
      s1 = "An advocacy to change the name, culture, and socio-economics of The Philippines into"
      s2 = "Maharlika"
      b1 = "Learn More"
      b2 = "Our Vision"
      [[languages.en.params.quote]]
        content = "With the new men that sprout from their bosom and with the memory of their past, they will work together to strengthen their country, resurrect the maritime and mercantile life natural to them. This and other things may happen within a hundred years or so."
        icon = "Jose Rizal"
        author = "Jose Rizal"
        src = "The Philippines 100 Years From Now"
        url = "/writers/rizal/dentro/part-4"
      [[languages.en.params.actionCards]]
        img = "/photos/meta/anito.jpg"
        title = "1: Constitutional Virtues"
        url = "/advocacy/maharlikanism"
        sub = "A New, Systemic Moral Foundation"
      [[languages.en.params.actionCards]]
        img = "/photos/social/lawmaker.jpg"
        title = "2: Federalism with Bicameral Parliament"
        url = "/governance/federalism"
        sub = "Democracy with a Focus"
      [[languages.en.params.actionCards]]
        img = "/photos/econ/freight.jpg"
        title = "3: The Fourth Branch of Government"
        url = "/governance/fourth-branch-government"
        sub = "The Resources Branch"
      [[languages.en.params.actionCards]]
        img = "/photos/social/grad.jpg"
        title = "4: The Maharlikan Academy"
        url = "/governance/maharlikan-academy/"
        sub = "Preserving and Promoting Maharlikan Culture"
      [[languages.en.params.superCards]]
        img = "/icons/spss.png"
        url = "https://superphysics.org/social"
        title = "What's Social Superphysics?"
        sub = "Sociology merged with Metaphysics"
      [[languages.en.params.superCards]]
        img = "/icons/specon.png"
        url = "https://www.superphysics.org/social/supersociology/principles/part-1/chapter-05/"
        title = "The Law of Social Cycles for Social Change"
        sub = "Worker, Warrior, Thinker, Trader"
      [[languages.en.params.superCards]]
        img = "/icons/heart.png"
        url = "https://www.superphysics.org/social/economics/principles/part-2/chapter-01c/"
        title = "The Effort Theory of Value for Economics"
        sub = "Economic Bayanihan System"
      [[languages.en.params.book]]
        h1 = "ᜀᜃ᜔ᜎᜆ᜔"
        title = "Read the Book"
        sub = "Maharlikanism is explained in the book Towards Maharlika"
      [[languages.en.params.contact]]
        h1 = "ᜂᜄ᜔ᜈᜌᜈ᜔"
        title = "Contact Us!"
        sub = "Do you have any questions? Or comments?"


  [languages.tl]
