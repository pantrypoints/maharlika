      [[languages.tl.params.quote]]
        content = "Sa mga bagong lalaking susupling mula sa kanilang dibdib at sa alaala ng kanilang nakaraan, magtatrabaho silang magkasama upang palakasin ang kanilang bansa, buhayin muli ang natural na buhay-dagat at kalakalan. Ito at iba pa ay maaaring mangyari sa loob ng isang daang taon o higit pa."
